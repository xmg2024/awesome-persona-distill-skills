<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" role="img"
  aria-labelledby="title desc">
  <title id="title">Connected persona illustration</title>
  <desc id="desc">An abstract network of silhouettes, nodes, and memory threads.</desc>
  <defs>
