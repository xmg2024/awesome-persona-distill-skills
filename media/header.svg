      <stop offset="0%" stop-color="#f6efe2" />
      <stop offset="55%" stop-color="#d7e6f6" />
      <stop offset="100%" stop-color="#f4d8d3" />
    </linearGradient>
    <linearGradient id="thread" x1="0%" y1="0%" x2="100%" y2="0%">
