      <stop offset="50%" stop-color="#457b9d" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#e76f51" stop-opacity="0.25" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
